apiVersion: v1
kind: ConfigMap
metadata:
  name: mtr-web-config
  namespace: mtr
data:
  config.json: |
    {
      "apiBaseUrl": "",
      "apiToken": ""
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtr-web
  namespace: mtr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mtr-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mtr-web
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/ztelliot/mtr-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /config.json
              port: http
          livenessProbe:
            httpGet:
              path: /config.json
              port: http
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          volumeMounts:
            - name: config
              mountPath: /usr/share/caddy/config.json
              subPath: config.json
              readOnly: true
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: mtr-web-config
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mtr-web
  namespace: mtr
spec:
  selector:
    app.kubernetes.io/name: mtr-web
  ports:
    - name: http
      port: 80
      targetPort: http
