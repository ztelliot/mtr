apiVersion: v1
kind: ServiceAccount
metadata:
  name: mtr-server
  namespace: mtr
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mtr-server-config
  namespace: mtr
data:
  server.yaml: |
    http_addr: ":8080"
    grpc_addr: ":8443"
    log_level: "info"
    tls:
      ca_file: "/var/run/mtr/tls/ca.crt"
      cert_file: "/var/run/mtr/tls/tls.crt"
      key_file: "/var/run/mtr/tls/tls.key"
    rate_limit:
      global:
        requests_per_minute: 600
        burst: 200
      ip:
        requests_per_minute: 60
        burst: 20
      cidr:
        requests_per_minute: 300
        burst: 100
        ipv4_prefix: 24
        ipv6_prefix: 64
      tools:
        ping:
          global:
            requests_per_minute: 120
            burst: 40
        traceroute:
          global:
            requests_per_minute: 60
            burst: 20
        mtr:
          global:
            requests_per_minute: 30
            burst: 10
        port:
          global:
            requests_per_minute: 120
            burst: 40
    runtime:
      count: 10
      max_hops: 30
      probe_step_timeout_sec: 1
      max_tool_timeout_sec: 300
      http_timeout_sec: 5
      dns_timeout_sec: 5
      resolve_timeout_sec: 3
      outbound_invoke_attempts: 3
      outbound_max_health_interval_sec: 300
    scheduler:
      agent_offline_after_sec: 90
      grpc_max_inflight_per_agent: 4
      outbound_max_inflight_per_agent: 1
      poll_interval_sec: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtr-server
  namespace: mtr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mtr-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mtr-server
    spec:
      serviceAccountName: mtr-server
      automountServiceAccountToken: false
      enableServiceLinks: false
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: ghcr.io/ztelliot/mtr-server:latest
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /etc/mtr/server.yaml
          env:
            - name: MTR_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mtr-server-env
                  key: database-url
            - name: MTR_REGISTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mtr-server-env
                  key: register-token
            - name: MTR_API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: mtr-server-env
                  key: api-tokens.yaml
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 8443
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/mtr/server.yaml
              subPath: server.yaml
              readOnly: true
            - name: tls
              mountPath: /var/run/mtr/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: mtr-server-config
        - name: tls
          secret:
            secretName: mtr-server-tls
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mtr-server
  namespace: mtr
spec:
  selector:
    app.kubernetes.io/name: mtr-server
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 8443
      targetPort: grpc
