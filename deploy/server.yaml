apiVersion: v1
kind: ServiceAccount
metadata:
  name: mtr-server
  namespace: mtr
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mtr-server-config
  namespace: mtr
data:
  server.yaml: |
    http_addr: ":8080"
    grpc_addr: ":8443"
    log_level: "info"
    trusted_proxies: []
    client_ip_headers: []
    tls:
      enabled: true
      ca_files:
        - "/var/run/mtr/tls/ca.crt"
      cert_file: "/var/run/mtr/tls/tls.crt"
      key_file: "/var/run/mtr/tls/tls.key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtr-server
  namespace: mtr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mtr-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mtr-server
    spec:
      serviceAccountName: mtr-server
      automountServiceAccountToken: false
      enableServiceLinks: false
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: ghcr.io/ztelliot/mtr-server:latest
          imagePullPolicy: Always
          args:
            - -config
            - /etc/mtr/server.yaml
          env:
            - name: MTR_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mtr-server-env
                  key: database-url
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 8443
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/mtr/server.yaml
              subPath: server.yaml
              readOnly: true
            - name: tls
              mountPath: /var/run/mtr/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: mtr-server-config
        - name: tls
          secret:
            secretName: mtr-server-tls
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mtr-server
  namespace: mtr
spec:
  selector:
    app.kubernetes.io/name: mtr-server
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 8443
      targetPort: grpc
