apiVersion: v1
kind: Secret
metadata:
  name: mtr-server-env
  namespace: mtr
type: Opaque
stringData:
  database-url: postgres://mtr:mtr@postgres:5432/mtr?sslmode=disable
  register-token: change-me-agent-token
  api-tokens.yaml: |
    - secret: frontend-token
      agents: ["*"]
      schedule_access: "read"
      tools:
        ping:
          allowed_args:
            protocol: "^(icmp)$"
        mtr:
          allowed_args:
            protocol: "^(icmp)$"
        http:
          allowed_args:
            method: "^(HEAD)$"
        dns: {}
    - secret: developer-token
      all: true
---
apiVersion: v1
kind: Secret
metadata:
  name: mtr-server-tls
  namespace: mtr
type: Opaque
stringData:
  ca.crt: |
    REPLACE_WITH_FULL_CA_PEM
  tls.crt: |
    REPLACE_WITH_FULL_SERVER_CERT_PEM
  tls.key: |
    REPLACE_WITH_FULL_SERVER_KEY_PEM
---
apiVersion: v1
kind: Secret
metadata:
  name: mtr-agent-env
  namespace: mtr
type: Opaque
stringData:
  register-token: change-me-agent-token
---
apiVersion: v1
kind: Secret
metadata:
  name: mtr-agent-tls
  namespace: mtr
type: Opaque
stringData:
  ca.crt: |
    REPLACE_WITH_FULL_CA_PEM
  tls.crt: |
    REPLACE_WITH_FULL_SHARED_AGENT_CERT_PEM
  tls.key: |
    REPLACE_WITH_FULL_SHARED_AGENT_KEY_PEM
