apiVersion: v1
kind: ServiceAccount
metadata:
  name: mtr-agent
  namespace: mtr
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mtr-agent-config
  namespace: mtr
data:
  agent.yaml: |
    mode: "grpc"
    log_level: "info"
    country: "CN"
    region: "k8s"
    provider: "kubernetes"
    isp: "bgp"
    protocols: 3
    hide_first_hops: 0
    capabilities:
      - ping
      - traceroute
      - mtr
      - http
      - dns
      - port
    tls:
      ca_file: "/var/run/mtr/tls/ca.crt"
      cert_file: "/var/run/mtr/tls/tls.crt"
      key_file: "/var/run/mtr/tls/tls.key"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mtr-agent
  namespace: mtr
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mtr-agent
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mtr-agent
    spec:
      serviceAccountName: mtr-agent
      automountServiceAccountToken: false
      enableServiceLinks: false
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
      containers:
        - name: agent
          image: ghcr.io/ztelliot/mtr-agent:latest
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /etc/mtr/agent.yaml
          env:
            - name: MTR_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MTR_SERVER_ADDR
              value: mtr-server.mtr.svc.cluster.local:8443
            - name: MTR_REGISTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mtr-agent-env
                  key: register-token
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
          volumeMounts:
            - name: config
              mountPath: /etc/mtr/agent.yaml
              subPath: agent.yaml
              readOnly: true
            - name: tls
              mountPath: /var/run/mtr/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: mtr-agent-config
        - name: tls
          secret:
            secretName: mtr-agent-tls
        - name: tmp
          emptyDir: {}
