apiVersion: v1
kind: ServiceAccount
metadata:
  name: mtr-agent
  namespace: mtr
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mtr-agent-node-reader
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mtr-agent-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mtr-agent-node-reader
subjects:
  - kind: ServiceAccount
    name: mtr-agent
    namespace: mtr
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mtr-agent-config
  namespace: mtr
data:
  render-agent-config.sh: |
    #!/bin/sh
    set -eu

    log() {
      printf '%s\n' "[render-agent-config] $*" >&2
    }

    api_server="${MTR_KUBERNETES_API_SERVER}"
    token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
    ca_file="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    label() {
      key="$1"
      kubectl \
        --server="${api_server}" \
        --certificate-authority="${ca_file}" \
        --token="${token}" \
        get node "${MTR_NODE_NAME}" \
        -o "go-template={{ index .metadata.labels \"${key}\" }}"
    }

    log_matching_labels() {
      log "matching node labels:"
      labels="$(
        kubectl \
          --server="${api_server}" \
          --certificate-authority="${ca_file}" \
          --token="${token}" \
          get node "${MTR_NODE_NAME}" \
          -o 'go-template={{range $key, $value := .metadata.labels}}{{printf "%s=%s\n" $key $value}}{{end}}'
      )"
      matching="$(printf '%s\n' "${labels}" | grep '^mtr\.ztelliot\.dev/' || true)"
      if [ -n "${matching}" ]; then
        printf '%s\n' "${matching}" | while IFS= read -r line; do
          log "  ${line}"
        done
      else
        log "  no mtr.ztelliot.dev/* labels found on node"
      fi
    }

    read_label() {
      key="$1"
      name="$2"
      err_file="/tmp/${name}.label.err"
      if value="$(label "${key}" 2>"${err_file}")"; then
        if [ "${value}" = "<no value>" ]; then
          value=""
        fi
        if [ -n "${value}" ]; then
          log "${name}: read ${key}=${value}"
        else
          log "${name}: label ${key} is not set"
        fi
        rm -f "${err_file}"
        printf '%s' "${value}"
        return 0
      fi
      log "${name}: failed to read label ${key}: $(cat "${err_file}")"
      rm -f "${err_file}"
      return 1
    }

    value_or_default() {
      name="$1"
      value="$2"
      fallback="$3"
      if [ -n "${value}" ]; then
        log "${name}: using node label value ${value}"
        printf '%s' "${value}"
      else
        log "${name}: node label missing, using fallback ${fallback}"
        printf '%s' "${fallback}"
      fi
    }

    log "rendering agent config"
    log "node=${MTR_NODE_NAME}"
    log "api_server=${api_server}"
    log_matching_labels

    country="$(read_label mtr.ztelliot.dev/country country || true)"
    region="$(read_label mtr.ztelliot.dev/region region || true)"
    provider="$(read_label mtr.ztelliot.dev/provider provider || true)"
    isp="$(read_label mtr.ztelliot.dev/isp isp || true)"
    protocols="$(read_label mtr.ztelliot.dev/protocols protocols || true)"
    hide_first_hops="$(read_label mtr.ztelliot.dev/hide-first-hops hide_first_hops || true)"
    capabilities="$(read_label mtr.ztelliot.dev/capabilities capabilities || true)"

    country="$(value_or_default country "${country}" CN)"
    region="$(value_or_default region "${region}" k8s)"
    provider="$(value_or_default provider "${provider}" kubernetes)"
    isp="$(value_or_default isp "${isp}" bgp)"
    protocols="$(value_or_default protocols "${protocols}" 3)"
    hide_first_hops="$(value_or_default hide_first_hops "${hide_first_hops}" 0)"
    if [ -n "${capabilities}" ]; then
      log "capabilities: using node label value ${capabilities}"
    else
      log "capabilities: node label missing, using fallback ping,traceroute,mtr,http,dns,port"
    fi

    write_capabilities() {
      if [ -n "${capabilities}" ]; then
        old_ifs="${IFS}"
        IFS=","
        for capability in ${capabilities}; do
          capability="$(printf '%s' "${capability}" | xargs)"
          if [ -n "${capability}" ]; then
            printf '  - %s\n' "${capability}"
          fi
        done
        IFS="${old_ifs}"
      else
        printf '%s\n' \
          '  - ping' \
          '  - traceroute' \
          '  - mtr' \
          '  - http' \
          '  - dns' \
          '  - port'
      fi
    }

    cat > /work/agent.yaml <<EOF
    mode: "grpc"
    log_level: "info"
    country: "${country}"
    region: "${region}"
    provider: "${provider}"
    isp: "${isp}"
    protocols: ${protocols}
    hide_first_hops: ${hide_first_hops}
    capabilities:
    EOF
    write_capabilities >> /work/agent.yaml
    cat >> /work/agent.yaml <<EOF
    tls:
      ca_file: "/var/run/mtr/tls/ca.crt"
      cert_file: "/var/run/mtr/tls/tls.crt"
      key_file: "/var/run/mtr/tls/tls.key"
    EOF

    log "wrote /work/agent.yaml"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mtr-agent
  namespace: mtr
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mtr-agent
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mtr-agent
    spec:
      serviceAccountName: mtr-agent
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsPolicy: Default
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
      initContainers:
        - name: render-agent-config
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /config/render-agent-config.sh
          env:
            - name: MTR_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: MTR_KUBERNETES_API_SERVER
              value: https://10.96.0.1:443
            - name: HOME
              value: /tmp
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: generated-config
              mountPath: /work
            - name: tmp
              mountPath: /tmp
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
      containers:
        - name: agent
          image: ghcr.io/ztelliot/mtr-agent:latest
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /etc/mtr/agent.yaml
          env:
            - name: MTR_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MTR_SERVER_ADDR
              value: mtr-server.mtr.svc.cluster.local:8443
            - name: MTR_REGISTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mtr-agent-env
                  key: register-token
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            privileged: false
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: true
            seccompProfile:
              type: Unconfined
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
          volumeMounts:
            - name: generated-config
              mountPath: /etc/mtr/agent.yaml
              subPath: agent.yaml
              readOnly: true
            - name: tls
              mountPath: /var/run/mtr/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: mtr-agent-config
            defaultMode: 0755
        - name: generated-config
          emptyDir: {}
        - name: kube-api-access
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
        - name: tls
          secret:
            secretName: mtr-agent-tls
        - name: tmp
          emptyDir: {}
