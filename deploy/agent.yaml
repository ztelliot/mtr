apiVersion: v1
kind: ServiceAccount
metadata:
  name: mtr-agent
  namespace: mtr
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mtr-agent-node-reader
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mtr-agent-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mtr-agent-node-reader
subjects:
  - kind: ServiceAccount
    name: mtr-agent
    namespace: mtr
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mtr-agent-config
  namespace: mtr
data:
  render-agent-config.sh: |
    #!/bin/sh
    set -eu

    log() {
      printf '%s\n' "[render-agent-config] $*" >&2
    }

    api_server="${MTR_KUBERNETES_API_SERVER}"
    token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
    ca_file="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    get_node_annotations() {
      kubectl \
        --server="${api_server}" \
        --certificate-authority="${ca_file}" \
        --token="${token}" \
        get node "${MTR_NODE_NAME}" \
        -o 'go-template={{range $key, $value := .metadata.annotations}}{{printf "%s=%s\n" $key $value}}{{end}}'
    }

    read_node_annotations() {
      max_attempts="${MTR_KUBERNETES_API_RETRIES:-5}"
      retry_delay="${MTR_KUBERNETES_API_RETRY_SECONDS:-2}"
      attempt=1
      err_file="/tmp/node-annotations.err"

      while :; do
        if annotations="$(get_node_annotations 2>"${err_file}")"; then
          rm -f "${err_file}"
          printf '%s' "${annotations}"
          return 0
        fi

        err="$(cat "${err_file}")"
        if [ "${attempt}" -ge "${max_attempts}" ]; then
          log "failed to read node annotations after ${attempt} attempt(s): ${err}"
          rm -f "${err_file}"
          return 1
        fi

        log "failed to read node annotations on attempt ${attempt}/${max_attempts}: ${err}"
        log "retrying in ${retry_delay}s"
        sleep "${retry_delay}"
        attempt=$((attempt + 1))
      done
    }

    log_matching_annotations() {
      log "matching node annotations:"
      matching="$(printf '%s\n' "${node_annotations}" | grep '^mtr\.ztelliot\.dev/' || true)"
      if [ -n "${matching}" ]; then
        printf '%s\n' "${matching}" | while IFS= read -r line; do
          log "  ${line}"
        done
      else
        log "  no mtr.ztelliot.dev/* annotations found on node"
      fi
    }

    read_annotation() {
      key="$1"
      name="$2"
      value=""
      while IFS= read -r line; do
        case "${line}" in
          "${key}="*)
            value="${line#*=}"
            break
            ;;
        esac
      done <<EOF_ANNOTATIONS
    ${node_annotations}
    EOF_ANNOTATIONS

      if [ -n "${value}" ]; then
        log "${name}: read ${key}=${value}"
      else
        log "${name}: annotation ${key} is not set"
      fi
      printf '%s' "${value}"
    }

    value_or_default() {
      name="$1"
      value="$2"
      fallback="$3"
      if [ -n "${value}" ]; then
        log "${name}: using node annotation value ${value}"
        printf '%s' "${value}"
      else
        log "${name}: node annotation missing, using fallback ${fallback}"
        printf '%s' "${fallback}"
      fi
    }

    log "rendering agent config"
    log "node=${MTR_NODE_NAME}"
    log "api_server=${api_server}"
    node_annotations="$(read_node_annotations)"
    log_matching_annotations

    country="$(read_annotation mtr.ztelliot.dev/country country || true)"
    region="$(read_annotation mtr.ztelliot.dev/region region || true)"
    provider="$(read_annotation mtr.ztelliot.dev/provider provider || true)"
    isp="$(read_annotation mtr.ztelliot.dev/isp isp || true)"
    protocols="$(read_annotation mtr.ztelliot.dev/protocols protocols || true)"
    hide_first_hops="$(read_annotation mtr.ztelliot.dev/hide-first-hops hide_first_hops || true)"
    capabilities="$(read_annotation mtr.ztelliot.dev/capabilities capabilities || true)"
    labels="$(read_annotation mtr.ztelliot.dev/labels labels || true)"

    country="$(value_or_default country "${country}" CN)"
    region="$(value_or_default region "${region}" k8s)"
    provider="$(value_or_default provider "${provider}" "")"
    isp="$(value_or_default isp "${isp}" bgp)"
    protocols="$(value_or_default protocols "${protocols}" 3)"
    hide_first_hops="$(value_or_default hide_first_hops "${hide_first_hops}" 0)"
    if [ -n "${capabilities}" ]; then
      log "capabilities: using node annotation value ${capabilities}"
    else
      log "capabilities: node annotation missing, using fallback ping,traceroute,mtr,http,dns,port"
    fi
    if [ -n "${labels}" ]; then
      log "labels: using node annotation value ${labels}"
    else
      labels="${country},${region},${provider},${isp}"
      log "labels: node annotation missing, using fallback ${labels}"
    fi

    write_capabilities() {
      if [ -n "${capabilities}" ]; then
        old_ifs="${IFS}"
        IFS=","
        for capability in ${capabilities}; do
          capability="$(printf '%s' "${capability}" | xargs)"
          if [ -n "${capability}" ]; then
            printf '  - %s\n' "${capability}"
          fi
        done
        IFS="${old_ifs}"
      else
        printf '%s\n' \
          '  - ping' \
          '  - traceroute' \
          '  - mtr' \
          '  - http' \
          '  - dns' \
          '  - port'
      fi
    }

    write_labels() {
      old_ifs="${IFS}"
      IFS=","
      seen_file="/tmp/mtr-agent-labels.seen"
      : > "${seen_file}"
      for label in ${labels}; do
        label="$(printf '%s' "${label}" | xargs)"
        case "${label}" in
          ""|"agent"|id:*)
            continue
            ;;
        esac
        if grep -Fxq "${label}" "${seen_file}"; then
          continue
        fi
        printf '%s\n' "${label}" >> "${seen_file}"
        printf '  - %s\n' "${label}"
      done
      rm -f "${seen_file}"
      IFS="${old_ifs}"
    }

    cat > /work/agent.yaml <<EOF
    mode: "grpc"
    log_level: "info"
    country: "${country}"
    region: "${region}"
    provider: "${provider}"
    isp: "${isp}"
    protocols: ${protocols}
    hide_first_hops: ${hide_first_hops}
    labels:
    EOF
    write_labels >> /work/agent.yaml
    cat >> /work/agent.yaml <<EOF
    capabilities:
    EOF
    write_capabilities >> /work/agent.yaml
    cat >> /work/agent.yaml <<EOF
    tls:
      enabled: true
      ca_files:
        - "/var/run/mtr/tls/ca.crt"
      cert_file: "/var/run/mtr/tls/tls.crt"
      key_file: "/var/run/mtr/tls/tls.key"
    EOF

    log "wrote /work/agent.yaml"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mtr-agent
  namespace: mtr
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mtr-agent
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mtr-agent
    spec:
      serviceAccountName: mtr-agent
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsPolicy: Default
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
      initContainers:
        - name: render-agent-config
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /config/render-agent-config.sh
          env:
            - name: MTR_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: MTR_KUBERNETES_API_SERVER
              value: https://10.96.0.1:443
            - name: HOME
              value: /tmp
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: generated-config
              mountPath: /work
            - name: tmp
              mountPath: /tmp
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
      containers:
        - name: agent
          image: ghcr.io/ztelliot/mtr-agent:latest
          imagePullPolicy: Always
          args:
            - -config
            - /etc/mtr/agent.yaml
          env:
            - name: MTR_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MTR_SERVER_ADDR
              value: mtr-server.mtr.svc.cluster.local:8443
            - name: MTR_REGISTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mtr-agent-env
                  key: register-token
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            privileged: false
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
          volumeMounts:
            - name: generated-config
              mountPath: /etc/mtr/agent.yaml
              subPath: agent.yaml
              readOnly: true
            - name: tls
              mountPath: /var/run/mtr/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: mtr-agent-config
            defaultMode: 0755
        - name: generated-config
          emptyDir: {}
        - name: kube-api-access
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
        - name: tls
          secret:
            secretName: mtr-agent-tls
        - name: tmp
          emptyDir: {}
