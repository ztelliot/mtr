name: Docker Build and Push

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  USERNAME: ztelliot
  REPO: mtr

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ startsWith(github.ref, 'refs/tags/v') || steps.filter.outputs.go == 'true' }}
      web: ${{ startsWith(github.ref, 'refs/tags/v') || steps.filter.outputs.web == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            go:
              - ".github/workflows/image.yml"
              - "Dockerfile.agent"
              - "Dockerfile.server"
              - "cmd/**"
              - "configs/**"
              - "go.mod"
              - "go.sum"
              - "internal/**"
            web:
              - ".github/workflows/image.yml"
              - "Dockerfile.web"
              - "web/**"

  build-go-images:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    strategy:
      matrix:
        component: [agent, server]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.USERNAME }}/${{ env.REPO }}-${{ matrix.component }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=(v\d+\.\d+\.\d+),group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=match,pattern=(v\d+\.\d+)\.\d+,group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=match,pattern=(v\d+)\.\d+\.\d+,group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set build args
        id: build-args
        run: |
          echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "COMMIT=${{ github.sha }}" >> $GITHUB_ENV
          echo "BUILT_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.${{ matrix.component }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILT_AT=${{ env.BUILT_AT }}

  build-web-image:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.USERNAME }}/${{ env.REPO }}-web
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=(v\d+\.\d+\.\d+),group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=match,pattern=(v\d+\.\d+)\.\d+,group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=match,pattern=(v\d+)\.\d+\.\d+,group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set build args
        run: |
          echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "COMMIT=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
