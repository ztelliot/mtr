name: Docker Build and Push

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  USERNAME: ztelliot
  REPO: mtr

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [agent, server, web]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.USERNAME }}/${{ env.REPO }}-${{ matrix.component }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=(v\d+\.\d+\.\d+),group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=match,pattern=(v\d+\.\d+)\.\d+,group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=match,pattern=(v\d+)\.\d+\.\d+,group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set build args
        id: build-args
        run: |
          echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "COMMIT=${{ github.sha }}" >> $GITHUB_ENV
          echo "BUILT_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.${{ matrix.component }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILT_AT=${{ env.BUILT_AT }}
