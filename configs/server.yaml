http_addr: ":8080"
grpc_addr: ":8443"
log_level: "info"
database_url: "postgres://mtr:mtr@postgres:5432/mtr?sslmode=disable"
geoip_url: ""
# Reverse proxy IPs/CIDRs allowed to supply client IP headers.
trusted_proxies: []
# Custom single-IP headers accepted unconditionally before proxy headers.
# X-Real-IP is handled separately and only trusted from trusted_proxies.
client_ip_headers: []
# Set all three files to enable mTLS on the gRPC control plane and require
# Agents to present a client certificate signed by this CA.
tls:
  enabled: false
  ca_files: []
  cert_file: ""
  key_file: ""
