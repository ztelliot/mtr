id: "edge-1"
mode: "grpc"
log_level: "info"
country: "CN"
region: "local"
provider: "kubernetes"
isp: "bgp"
server_addr: "localhost:8443"
register_token: "change-me-agent-token"
http_token: "change-me-agent-http-token"
http_addr: ":9000"
protocols: 3
hide_first_hops: 0
capabilities:
  - ping
  - traceroute
  - mtr
  - http
  - dns
  - port
speedtest:
  # Only exposed when HTTP mode is enabled on http_addr. Set max_bytes to 0 to disable.
  default_bytes: 1048576
  max_bytes: 10485760
  global_requests_per_minute: 120
  global_burst: 20
  ip_requests_per_minute: 12
  ip_burst: 3
# Set all three files to verify the Server certificate and present a client
# certificate for mTLS. Multiple Agents may share the same client certificate.
tls:
  enabled: false
  ca_files: []
  cert_file: ""
  key_file: ""
# TLS for the HTTP Agent listener when mode includes "http". Set enabled with
# cert_file/key_file to serve HTTPS; set ca_files as well to require Server
# client certificates for HTTP mTLS.
http_tls:
  enabled: false
  ca_files: []
  cert_file: ""
  key_file: ""
